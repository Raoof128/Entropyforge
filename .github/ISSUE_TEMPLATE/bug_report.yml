name: Bug report
description: Report incorrect behavior or a crash
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, expected vs actual behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EntropyForge / commit
      description: Version or git SHA if installed from source.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version (`python -V`), install method (`pip install -e .`).
    validations:
      required: true
